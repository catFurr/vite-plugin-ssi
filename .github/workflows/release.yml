name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Bun latest
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(bun -e "console.log(require('./package.json').version)")" >> $GITHUB_OUTPUT

      # Make the deploy idempotent: pushes to main that don't bump the version
      # (docs, CI tweaks, etc.) skip publishing instead of failing on a
      # "version already exists" error from npm/JSR.
      - name: Check if version already published to npm
        id: published
        run: |
          if npm view "@catfyrr/vite-plugin-ssi@${{ steps.package-version.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.package-version.outputs.version }} already published — skipping release/publish steps."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.published.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Release v${{ steps.package-version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: ""

      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR
        if: steps.published.outputs.exists == 'false'
        run: bunx jsr publish
